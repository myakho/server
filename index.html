<!DOCTYPE html>
<html>
<head>
    <title>Tetris Game</title> <!-- 페이지 제목 -->
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background: #000; /* 배경색을 검정색으로 설정 */
            color: #fff; /* 글자색을 흰색으로 설정 */
            font-family: sans-serif; /* 글꼴을 sans-serif로 설정 */
        }
        #tetris {
            border: 1px solid #555; /* 테두리를 회색으로 설정 */
            margin-bottom: 10px; /* 아래쪽 여백 설정 */
        }
        #next {
            border: 1px solid #555; /* 테두리를 회색으로 설정 */
            margin-bottom: 10px; /* 아래쪽 여백 설정 */
        }
        .button-container {
            display: flex;
            justify-content: space-around; /* 버튼들을 공간을 균등하게 배치 */
            margin-bottom: 10px; /* 아래쪽 여백 설정 */
        }
        button {
            padding: 10px; /* 버튼 내 여백 설정 */
            font-size: 16px; /* 글자 크기 설정 */
        }
        #score {
            margin-bottom: 10px; /* 아래쪽 여백 설정 */
        }
        .link-container {
            margin-top: 20px; /* 위쪽 여백 설정 */
        }
    </style>
</head>
<body>
    <canvas id="tetris"></canvas> <!-- 테트리스 게임이 표시될 캔버스 -->
    <canvas id="next"></canvas> <!-- 다음 테트로미노가 표시될 캔버스 -->
    <div class="button-container">
        <button id="left">Left</button> <!-- 왼쪽으로 이동하는 버튼 -->
        <button id="rotate">Rotate</button> <!-- 회전하는 버튼 -->
        <button id="right">Right</button> <!-- 오른쪽으로 이동하는 버튼 -->
        <button id="down">Down</button> <!-- 아래로 이동하는 버튼 -->
    </div>
    <div id="score">0</div> <!-- 점수를 표시할 영역 -->
    <div class="link-container">
        <button onclick="window.location.href='https://github.com/myakho/server/tree/master'">Go to GitHub</button> <!-- GitHub로 이동하는 버튼 -->
    </div>
    <script src="tetris.js"></script> <!-- tetris.js 스크립트를 불러옴 -->
</body>
</html>
