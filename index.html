<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #000;
            margin: 0;
        }
        #tetris, #next {
            border: 1px solid #fff;
            background: #000;
        }
        #score {
            color: #fff;
            font-size: 20px;
        }
        #info {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>
<body>
    <div id="info">
        <canvas id="next" width="120" height="120"></canvas>
        <div id="score">0</div>
    </div>
    <canvas id="tetris" width="300" height="600"></canvas>
    <script src="tetris.js"></script>
</body>
</html>
