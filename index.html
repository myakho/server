<!DOCTYPE html>
<html>
<head>
    <title>Tetris Game</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background: #000;
            color: #fff;
            font-family: sans-serif;
        }
        #tetris {
            border: 1px solid #555;
            margin-bottom: 10px;
        }
        #next {
            border: 1px solid #555;
            margin-bottom: 10px;
        }
        .button-container {
            display: flex;
            justify-content: space-around;
            margin-bottom: 10px;
        }
        button {
            padding: 10px;
            font-size: 16px;
        }
        #score {
            margin-bottom: 10px;
        }
        .link-container {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <canvas id="tetris"></canvas>
    <canvas id="next"></canvas>
    <div class="button-container">
        <button id="left">Left</button>
        <button id="rotate">Rotate</button>
        <button id="right">Right</button>
        <button id="down">Down</button>
    </div>
    <div id="score">0</div>
    <div class="link-container">
        <button onclick="window.location.href='https://github.com/myakho/server/tree/master'">작업 파일 이동</button>
    </div>
    <script src="tetris.js"></script>
</body>
</html>
