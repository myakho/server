<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #000;
            margin: 0;
            color: #fff;
        }
        #game-container {
            display: flex;
        }
        #tetris {
            border: 1px solid #fff;
            background: #000;
        }
        #next-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-left: 20px;
        }
        #next {
            border: 1px solid #fff;
            background: #000;
        }
        #score {
            text-align: center;
            margin-top: 20px;
            font-size: 24px;
        }
        #controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }
        button {
            margin: 5px;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="tetris"></canvas>
        <div id="next-container">
            <canvas id="next" width="120" height="120"></canvas>
            <div id="score">0</div>
            <div id="controls">
                <button id="left">Left</button>
                <button id="right">Right</button>
                <button id="down">Down</button>
                <button id="rotate">Rotate</button>
            </div>
        </div>
    </div>
    <script src="tetris.js"></script>
</body>
</html>
